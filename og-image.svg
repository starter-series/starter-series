<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Starter Series cold-start command</title>
  <desc id="desc">Run npx @starter-series/create add-component inside an exported AI-built repo.</desc>
  <defs>
    <radialGradient id="blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="teal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity=".38"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="headline" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000000" flood-opacity=".34"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#0e1117"/>
  <circle cx="176" cy="72" r="330" fill="url(#blue)" filter="url(#blur)"/>
  <circle cx="1060" cy="230" r="285" fill="url(#pink)" filter="url(#blur)"/>
  <circle cx="450" cy="640" r="310" fill="url(#teal)" filter="url(#blur)"/>

  <g filter="url(#shadow)">
    <rect x="78" y="74" width="1044" height="482" rx="34" fill="#141923" fill-opacity=".72"/>
    <rect x="78.5" y="74.5" width="1043" height="481" rx="33.5" fill="none" stroke="#ffffff" stroke-opacity=".12"/>
    <path d="M112 108h976v112c-154-32-319-10-493 28-214 47-366 52-483 20z" fill="#ffffff" fill-opacity=".045"/>
  </g>

  <text x="128" y="142" fill="#ffffff" fill-opacity=".62" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="500">starter-series</text>
  <text x="128" y="238" fill="url(#headline)" font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-3">
    <tspan x="128" dy="0">One dry-run</tspan>
    <tspan x="128" dy="78">before launch.</tspan>
  </text>
  <text x="128" y="358" fill="#ffffff" fill-opacity=".62" font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif" font-size="28" font-weight="500">
    <tspan x="128" dy="0">Paste this inside a Lovable, v0, or Bolt export.</tspan>
  </text>

  <g>
    <rect x="128" y="414" width="808" height="78" rx="18" fill="#030712" fill-opacity=".52"/>
    <rect x="128.5" y="414.5" width="807" height="77" rx="17.5" fill="none" stroke="#ffffff" stroke-opacity=".12"/>
    <text x="164" y="464" fill="#e5e7eb" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="28" font-weight="500">npx @starter-series/create add-component</text>
  </g>
  <text x="128" y="530" fill="#ffffff" fill-opacity=".46" font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif" font-size="23" font-weight="500">Safe by default: prints a CI/CD, security, and maintenance plan before writing files.</text>
</svg>
