name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install static-site toolchain
        run: npm ci

      - name: Run local validation gates
        run: |
          npm run lint
          npm test
          npm run build
          npm audit --audit-level=high

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser first-action smoke
        run: npm run test:browser

      - name: Scan for secrets
        env:
          # Bump together; checksum from
          # https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tgz" | sha256sum -c -
          tar xz -C /tmp -f /tmp/gitleaks.tgz
          /tmp/gitleaks detect --source . --verbose --redact

      - name: Check for large files
        run: |
          LARGE=$(find . -not -path './.git/*' -type f -size +5M)
          if [ -n "$LARGE" ]; then
            echo "::error::Large files detected (>5 MB):"
            echo "$LARGE"
            exit 1
          fi

      - name: Validate HTML
        run: |
          for f in *.html; do
            if ! head -1 "$f" | grep -qi 'doctype'; then
              echo "::error::Missing DOCTYPE: $f"
              exit 1
            fi
            echo "Valid: $f"
          done

      - name: Check internal links
        run: |
          : > /tmp/broken
          python3 - <<'PY' > /tmp/starter-series-links
          from html.parser import HTMLParser

          class Links(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.urls = set()
              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if value and value.startswith("https://github.com/starter-series/"):
                          self.urls.add(value)

          p = Links()
          p.feed(open("index.html", encoding="utf-8").read())
          for url in sorted(p.urls):
              print(url)
          PY
          while read -r url; do
            if [ -z "$url" ]; then continue; fi
            STATUS=$(curl -L -s -o /dev/null -w '%{http_code}' "$url")
            if [ "$STATUS" != "200" ]; then
              echo "::error::Broken link ($STATUS): $url"
              echo "$url" >> /tmp/broken
            else
              echo "OK: $url"
            fi
          done < /tmp/starter-series-links
          if [ -s /tmp/broken ]; then exit 1; fi
