name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets
        env:
          # Bump together; checksum from
          # https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tgz" | sha256sum -c -
          tar xz -C /tmp -f /tmp/gitleaks.tgz
          /tmp/gitleaks detect --source . --verbose --redact

      - name: Check for large files
        run: |
          LARGE=$(find . -not -path './.git/*' -type f -size +5M)
          if [ -n "$LARGE" ]; then
            echo "::error::Large files detected (>5 MB):"
            echo "$LARGE"
            exit 1
          fi

      - name: Validate locale JSON
        run: |
          for f in locales/*.json; do
            python3 -c "import json; json.load(open('$f'))" || {
              echo "::error::Invalid JSON: $f"
              exit 1
            }
            echo "Valid: $f"
          done

      - name: Validate HTML
        run: |
          for f in *.html; do
            if ! head -1 "$f" | grep -qi 'doctype'; then
              echo "::error::Missing DOCTYPE: $f"
              exit 1
            fi
            echo "Valid: $f"
          done

      - name: Check internal links
        run: |
          BROKEN=0
          for url in $(grep -oP 'https://github\.com/starter-series/[a-z-]+' index.html | sort -u); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$url")
            if [ "$STATUS" != "200" ]; then
              echo "::error::Broken link ($STATUS): $url"
              BROKEN=1
            else
              echo "OK: $url"
            fi
          done
          exit $BROKEN
