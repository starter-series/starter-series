name: Org audit

# Weekly receipt for the current completion baseline. Public-surface cleanup
# repos are cloned only for claim guards; they are not counted as baseline
# completion evidence. External package repos are cloned only for package-name
# drift guards; their release proof stays in separate proof sessions.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Audit baseline repos and public drift guards
        run: |
          set -euo pipefail
          ROOT="/tmp/starter-series-baseline"
          REPOS="starter-series browser-extension-starter cloudflare-pages-starter discord-bot-starter docker-deploy-starter electron-app-starter mcp-server-starter npm-package-starter python-mcp-server-starter react-native-starter telegram-bot-starter vscode-extension-starter ProfileKit profilekit-mcp"
          CLAIM_REPOS="dot-github icon-maker"
          EXTERNAL_PACKAGE_REPOS="create-starter shotkit"
          mkdir -p "$ROOT"
          for r in $REPOS; do
            git clone --quiet --depth=1 "https://github.com/starter-series/$r" "$ROOT/$r"
          done
          for r in $CLAIM_REPOS; do
            git clone --quiet --depth=1 "https://github.com/starter-series/$r" "$ROOT/$r"
          done
          for r in $EXTERNAL_PACKAGE_REPOS; do
            git clone --quiet --depth=1 "https://github.com/starter-series/$r" "$ROOT/$r"
          done
          (
            cd "$ROOT/starter-series"
            npm ci
            npm run lint
            npm test
            npm run build
          )
          {
            echo "## Weekly baseline and public-drift receipt — $(date -u '+%Y-%m-%d')"
            echo ""
            node scripts/audit-baseline.js --root "$ROOT" --markdown
          } >> "$GITHUB_STEP_SUMMARY"
